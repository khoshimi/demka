<script>
    let currentUser = null;
async function register() {
    let fio = document.getElementById('regFio').value;
    let phone = document.getElementById('regPhone').value;
    let email = document.getElementById('regEmail').value;
    let login = document.getElementById('regLogin').value;
    let password = document.getElementById('regPass').value;
    let msgDiv = document.getElementById('regMsg');
    if (!fio || !phone || !email || !login || !password) {
        msgDiv.innerHTML = '❌ Заполните все поля!';
        msgDiv.className = 'message error';
        return;
    }
    let response = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ login, password, fio, phone, email })
    });
    let data = await response.json();
    if (data.success) {
        msgDiv.innerHTML = data.message;
        msgDiv.className = 'message success';
        document.getElementById('regFio').value = '';
        document.getElementById('regPhone').value = '';
        document.getElementById('regEmail').value = '';
        document.getElementById('regLogin').value = '';
        document.getElementById('regPass').value = '';
    } else {
        msgDiv.innerHTML = '❌ ' + data.message;
        msgDiv.className = 'message error';
    }
}
async function login() {
    let login = document.getElementById('authLogin').value;
    let password = document.getElementById('authPass').value;
    let msgDiv = document.getElementById('authMsg');    
    if (!login || !password) {
        msgDiv.innerHTML = '❌ Введите логин и пароль!';
        msgDiv.className = 'message error';
        return;
    }  
    let response = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ login, password })
    });
    let data = await response.json();
    if (data.success) {
        currentUser = data.user;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        window.location.href = 'profile.html';
    } else {
        msgDiv.innerHTML = '❌ ' + data.message;
        msgDiv.className = 'message error';
    }
}
async function adminLogin() {
    let login = document.getElementById('adminLogin').value;
    let password = document.getElementById('adminPass').value;
    let msgDiv = document.getElementById('adminMsg');
    if (!login || !password) {
        msgDiv.innerHTML = '❌ Введите логин и пароль!';
        msgDiv.className = 'message error';
        return;
    }
    let response = await fetch('/admin-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ login, password })
    });
    let data = await response.json();
    if (data.success) {
        localStorage.setItem('isAdmin', 'true');
        window.location.href = 'admin.html';
    } else {
        msgDiv.innerHTML = '❌ ' + data.message;
        msgDiv.className = 'message error';
    }
}
</script>
<script>
async function loadProfile() {
    let savedUser = localStorage.getItem('currentUser');
    if (!savedUser) {
        window.location.href = 'index.html';
        return;
    }
    currentUser = JSON.parse(savedUser);    
    let userInfoDiv = document.getElementById('userInfo');
    userInfoDiv.innerHTML = `
        <p><strong>ФИО:</strong> ${currentUser.fio}</p>
        <p><strong>Телефон:</strong> ${currentUser.phone}</p>
        <p><strong>Email:</strong> ${currentUser.email}</p>
        <p><strong>Логин:</strong> ${currentUser.login}</p>
    `;    
    let response = await fetch('/get-orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentUser.id })
    });    
    let data = await response.json();
    showOrders(data.orders);
}
function showOrders(orders) {
    let ordersDiv = document.getElementById('ordersList');
    if (orders.length === 0) {
        ordersDiv.innerHTML = '<p style="text-align:center; color:#888;">У вас пока нет заявок</p>';
        return;
    }
    ordersDiv.innerHTML = '';
    for (let order of orders) {
        let statusClass = '';
        if (order.status === 'новая') statusClass = 'status-new';
        else if (order.status === 'выполнена') statusClass = 'status-done';
        else statusClass = 'status-cancel';
        let statusText = '';
        if (order.status === 'новая') statusText = '🟡 новая';
        else if (order.status === 'выполнена') statusText = '🟢 выполнена';
        else statusText = '🔴 отменена';
        ordersDiv.innerHTML += `
            <div class="order-item">
                <strong>📅 ${order.date} ${order.time}</strong><br>
                📍 ${order.address}<br>
                🧹 ${order.service}<br>
                💳 ${order.payment}<br>
                <span class="order-status ${statusClass}">📌 ${statusText}</span>
            </div>
        `;
    }
}
async function loadAdminPanel() {
    let isAdmin = localStorage.getItem('isAdmin');
    if (!isAdmin) {
        window.location.href = 'index.html';
        return;
    }
    let response = await fetch('/get-all-orders');
    let data = await response.json();
    showAllOrders(data.orders);
}
async function showAllOrders(orders) {
    let ordersDiv = document.getElementById('allOrdersList');
    if (orders.length === 0) {
        ordersDiv.innerHTML = '<p style="text-align:center; color:#888;">Нет заявок</p>';
        return;
    }
    ordersDiv.innerHTML = '';
    for (let order of orders) {
        let statusClass = '';
        if (order.status === 'новая') statusClass = 'status-new';
        else if (order.status === 'выполнена') statusClass = 'status-done';
        else statusClass = 'status-cancel';    
        let statusText = '';
        if (order.status === 'новая') statusText = '🟡 новая';
        else if (order.status === 'выполнена') statusText = '🟢 выполнена';
        else statusText = '🔴 отменена';      
        ordersDiv.innerHTML += `
            <div class="order-item">
                <strong>👤 Клиент:</strong> ${order.userFio}<br>
                <strong>📞 Телефон:</strong> ${order.userPhone}<br>
                <strong>📧 Email:</strong> ${order.userEmail}<br>
                <strong>📅 Дата:</strong> ${order.date} ${order.time}<br>
                <strong>📍 Адрес:</strong> ${order.address}<br>
                <strong>🧹 Услуга:</strong> ${order.service}<br>
                <strong>💳 Оплата:</strong> ${order.payment}<br>
                <strong>📌 Статус:</strong> 
                <select class="status-select" onchange="updateStatus(${order.id}, this.value)">
                    <option value="новая" ${order.status === 'новая' ? 'selected' : ''}>🟡 новая</option>
                    <option value="выполнена" ${order.status === 'выполнена' ? 'selected' : ''}>🟢 выполнена</option>
                    <option value="отменена" ${order.status === 'отменена' ? 'selected' : ''}>🔴 отменена</option>
                </select>
                <span class="order-status ${statusClass}" style="margin-left:10px;">${statusText}</span>
            </div>
        `;
    }
}
async function updateStatus(orderId, newStatus) {
    let response = await fetch('/update-order-status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ orderId, status: newStatus })
    });
    let data = await response.json();
    if (data.success) {
        loadAdminPanel();
    } else {
        alert('Ошибка при обновлении статуса');
    }
}
async function createOrder() {
    let address = document.getElementById('orderAddress').value;
    let date = document.getElementById('orderDate').value;
    let time = document.getElementById('orderTime').value;
    let service = document.getElementById('orderService').value;
    let payment = document.getElementById('orderPayment').value;
    let msgDiv = document.getElementById('orderMsg'); 
    if (!address || !date || !time || !service || !payment) {
        msgDiv.innerHTML = '❌ Заполните все поля!';
        msgDiv.className = 'message error';
        return;
    }
    let savedUser = localStorage.getItem('currentUser');
    if (!savedUser) {
        window.location.href = 'index.html';
        return;
    }
    let user = JSON.parse(savedUser);
    let response = await fetch('/create-order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: user.id, address, date, time, service, payment })
    });
    let data = await response.json();
    if (data.success) {
        msgDiv.innerHTML = '✅ ' + data.message;
        msgDiv.className = 'message success';
        setTimeout(() => {
            window.location.href = 'profile.html';
        }, 1500);
    } else {
        msgDiv.innerHTML = '❌ Ошибка при создании заявки';
        msgDiv.className = 'message error';
    }
}
function goToNewOrder() {
    window.location.href = 'new-order.html';
}
function goToProfile() {
    window.location.href = 'profile.html';
}
function logout() {
    localStorage.removeItem('currentUser');
    window.location.href = 'index.html';
}
function adminLogout() {
    localStorage.removeItem('isAdmin');
    window.location.href = 'index.html';
}
if (window.location.pathname.includes('profile.html')) {
    loadProfile();
}
if (window.location.pathname.includes('admin.html')) {
    loadAdminPanel();
}
</script>
<!-- server -->
<script>
const express = require('express');
const app = express();
app.use(express.json());
app.use(express.static('.'));
let users = [];
let nextUserId = 1;
app.post('/register', (req, res) => {
    const { login, password, fio, phone, email } = req.body;
    const userExists = users.find(u => u.login === login);
    if (userExists) {
        res.json({ success: false, message: 'Логин уже занят' });
        return;
    }
    const newUser = {
        id: nextUserId++,
        login: login,
        password: password,
        fio: fio,
        phone: phone,
        email: email
    };
    users.push(newUser);
    res.json({ success: true, message: 'Регистрация успешна!', userId: newUser.id });
});
app.post('/login', (req, res) => {
    const { login, password } = req.body;
    const user = users.find(u => u.login === login && u.password === password);
    if (user) {
        res.json({ 
            success: true, 
            message: 'Вход выполнен!', 
            user: { id: user.id, login: user.login, fio: user.fio, phone: user.phone, email: user.email }
        });
    } else {
        res.json({ success: false, message: 'Неверный логин или пароль' });
    }
});
app.post('/admin-login', (req, res) => {
    const { login, password } = req.body;
    if (login === 'adminka' && password === 'password') {
        res.json({ success: true, message: 'Добро пожаловать, админ!' });
    } else {
        res.json({ success: false, message: 'Неверный логин или пароль администратора' });
    }
});
app.listen(3000, () => {
    console.log('Сервер запущен на http://localhost:3000');
});
</script>
